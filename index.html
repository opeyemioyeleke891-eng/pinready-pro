put;
}
</script></body>
</html>
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinReady Pro</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0b0714;
    color: white;
    padding: 18px;
    margin: 0;
  }
  h1 {
    font-size: 34px;
    margin-bottom: 8px;
  }
  p.topnote {
    color: #d1c4e9;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #241734;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  .tab-btn.active {
    background: linear-gradient(90deg, #8b5cf6, #d946ef);
  }
  .section {
    display: none;
  }
  .section.active {
    display: block;
  }
  input, textarea, button {
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
  }
  textarea {
    min-height: 140px;
    resize: vertical;
  }
  .main-btn {
    background: linear-gradient(90deg, #8b5cf6, #d946ef);
    color: white;
    font-weight: bold;
    margin-top: 14px;
  }
  .secondary-btn {
    background: #2b1d3e;
    color: white;
    font-weight: bold;
    margin-top: 10px;
  }
  .card {
    background: #161022;
    padding: 16px;
    margin-top: 14px;
    border-radius: 16px;
    line-height: 1.55;
  }
  .card h3 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 18px;
  }
  .small-note {
    color: #c4b5fd;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 8px;
  }
  .product-block {
    background: #120c1d;
    border-radius: 16px;
    padding: 14px;
    margin-top: 16px;
  }
  .copy-status {
    margin-top: 8px;
    font-size: 13px;
    color: #c4f7c2;
  }
</style>
</head>
<body><h1>🚀 PinReady Pro</h1>
<p class="topnote">
Create Pinterest-ready content fast. For best results, paste the exact Amazon product title.
If you paste a link, the app will use a clean fallback name.
</p><div class="tabs">
  <button class="tab-btn active" onclick="showTab('single', this)">Single</button>
  <button class="tab-btn" onclick="showTab('bulk', this)">Bulk</button>
</div><div id="single" class="section active">
  <input id="product" placeholder="Paste product title or Amazon link">
  <input id="benefit" placeholder="Main benefit (optional)">
  <input id="audience" placeholder="Target audience (optional)">
  <button class="main-btn" onclick="generateSingle()">Generate Pin</button>
  <button class="secondary-btn" onclick="copySingle()">Copy Single Result</button>
  <div class="copy-status" id="singleCopyStatus"></div>
  <div id="singleOutput"></div>
</div><div id="bulk" class="section">
  <textarea id="bulkProducts" placeholder="Paste one product per lineMini Waffle Maker
Under Sink Organizer
https://a.co/d/011TvKcy"></textarea>
<input id="bulkBenefit" placeholder="Main benefit for all products (optional)">
<input id="bulkAudience" placeholder="Target audience for all products (optional)">
<button class="main-btn" onclick="generateBulk()">Generate Bulk Pins</button>
<button class="secondary-btn" onclick="copyBulk()">Copy All Bulk Results</button>

  <div class="copy-status" id="bulkCopyStatus"></div>
  <div class="small-note">
    Bulk mode works best when each line is an exact product title.
  </div>
  <div id="bulkOutput"></div>
</div><script>
let lastSingleText = "";
let lastBulkText = "";

function showTab(tabId, btn) {
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.querySelectorAll('.tab-btn').forEach(button => {
    button.classList.remove('active');
  });
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

function normalizeProduct(raw) {
  raw = raw.trim();
  if (!raw) return "";
  if (raw.includes("http")) return "Trending Amazon Find";
  return raw;
}

function buildPin(productRaw, benefitRaw, audienceRaw) {
  const product = normalizeProduct(productRaw);
  const benefit = benefitRaw && benefitRaw.trim() ? benefitRaw.trim() : "making life easier";
  const audience = audienceRaw && audienceRaw.trim() ? audienceRaw.trim() : "people";

  const titles = [
    `Why Everyone Is Saving ${product} Right Now`,
    `${product} That Makes ${benefit} So Much Easier`,
    `This ${product} Is All Over Pinterest`
  ];

  const description = `If you’ve been looking for something that helps with ${benefit}, ${product} is one of those finds that actually makes sense. It feels useful, simple, and easy to add into your routine. Perfect for ${audience} who want something practical but still worth getting. The creator really picked a good one here, which is probably why people keep saving products like this.`;

  const hooks = [
    `this made ${benefit} easier`,
    `one of my favorite amazon finds`,
    `this is why people keep saving these`
  ];

  const keywords = [
    product,
    "amazon finds",
    "pinterest finds",
    "must have products",
    "viral amazon products",
    "product recommendations"
  ];

  const boards = [
    "Amazon Finds",
    "Pinterest Favorites",
    "Best Amazon Products"
  ];

  const altText = `${product} shown in a clean Pinterest-style product image for ${benefit}.`;

  return {
    product,
    titles,
    description,
    hooks,
    keywords,
    boards,
    altText
  };
}

function generateSingle() {
  const productRaw = document.getElementById("product").value;
  const benefitRaw = document.getElementById("benefit").value;
  const audienceRaw = document.getElementById("audience").value;

  if (!productRaw.trim()) {
    document.getElementById("singleOutput").innerHTML = '<div class="card">Please enter a product first.</div>';
    return;
  }

  const pin = buildPin(productRaw, benefitRaw, audienceRaw);

  lastSingleText =
`PRODUCT:
${pin.product}

PIN TITLES:
1. ${pin.titles[0]}
2. ${pin.titles[1]}
3. ${pin.titles[2]}

PIN DESCRIPTION:
${pin.description}

TEXT OVERLAY HOOKS:
1. ${pin.hooks[0]}
2. ${pin.hooks[1]}
3. ${pin.hooks[2]}

SEO KEYWORDS:
${pin.keywords.join(", ")}

BOARD NAMES:
1. ${pin.boards[0]}
2. ${pin.boards[1]}
3. ${pin.boards[2]}

ALT TEXT:
${pin.altText}`;

  document.getElementById("singleOutput").innerHTML = `
    <div class="card">
      <h3>Titles</h3>
      ${pin.titles.join("<br><br>")}
    </div>

    <div class="card">
      <h3>Description</h3>
      ${pin.description}
    </div>

    <div class="card">
      <h3>Hooks</h3>
      ${pin.hooks.join("<br><br>")}
    </div>

    <div class="card">
      <h3>SEO Keywords</h3>
      ${pin.keywords.join(", ")}
    </div>

    <div class="card">
      <h3>Board Names</h3>
      ${pin.boards.join("<br><br>")}
    </div>

    <div class="card">
      <h3>Alt Text</h3>
      ${pin.altText}
    </div>
  `;

  document.getElementById("singleCopyStatus").innerText = "";
}

function generateBulk() {
  const rawText = document.getElementById("bulkProducts").value;
  const benefitRaw = document.getElementById("bulkBenefit").value;
  const audienceRaw = document.getElementById("bulkAudience").value;

  const lines = rawText
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  if (lines.length === 0) {
    document.getElementById("bulkOutput").innerHTML = '<div class="card">Please paste at least one product.</div>';
    return;
  }

  let html = "";
  let bulkText = "";

  lines.forEach((line, index) => {
    const pin = buildPin(line, benefitRaw, audienceRaw);

    bulkText +=
`#${index + 1} ${pin.product}

PIN TITLES:
1. ${pin.titles[0]}
2. ${pin.titles[1]}
3. ${pin.titles[2]}

PIN DESCRIPTION:
${pin.description}

TEXT OVERLAY HOOKS:
1. ${pin.hooks[0]}
2. ${pin.hooks[1]}
3. ${pin.hooks[2]}

SEO KEYWORDS:
${pin.keywords.join(", ")}

BOARD NAMES:
1. ${pin.boards[0]}
2. ${pin.boards[1]}
3. ${pin.boards[2]}

ALT TEXT:
${pin.altText}

------------------------------

`;

    html += `
      <div class="product-block">
        <div class="card">
          <h3>${index + 1}. ${pin.product}</h3>
          <strong>Titles</strong><br>
          ${pin.titles.join("<br><br>")}
        </div>

        <div class="card">
          <strong>Description</strong><br>
          ${pin.description}
        </div>

        <div class="card">
          <strong>Hooks</strong><br>
          ${pin.hooks.join("<br><br>")}
        </div>

        <div class="card">
          <strong>SEO Keywords</strong><br>
          ${pin.keywords.join(", ")}
        </div>

        <div class="card">
          <strong>Board Names</strong><br>
          ${pin.boards.join("<br><br>")}
        </div>

        <div class="card">
          <strong>Alt Text</strong><br>
          ${pin.altText}
        </div>
      </div>
    `;
  });

  lastBulkText = bulkText;
  document.getElementById("bulkOutput").innerHTML = html;
  document.getElementById("bulkCopyStatus").innerText = "";
}

function copySingle() {
  if (!lastSingleText) {
    document.getElementById("singleCopyStatus").innerText = "Generate something first.";
    return;
  }
  navigator.clipboard.writeText(lastSingleText).then(() => {
    document.getElementById("singleCopyStatus").innerText = "Single result copied.";
  });
}

function copyBulk() {
  if (!lastBulkText) {
    document.getElementById("bulkCopyStatus").innerText = "Generate bulk results first.";
    return;
  }
  navigator.clipboard.writeText(lastBulkText).then(() => {
    document.getElementById("bulkCopyStatus").innerText = "Bulk results copied.";
  });
}
</script></body>
  </html>
